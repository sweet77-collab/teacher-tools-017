<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>財富自由計算器</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC','Helvetica Neue',sans-serif;background:#111;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.ted-tag{background:#E62B1E;color:#fff;font-size:11px;font-weight:700;padding:4px 12px;letter-spacing:2px;display:inline-block;margin-bottom:20px}
h1{font-size:2.2rem;font-weight:700;margin-bottom:6px;letter-spacing:-0.5px}
.sub{font-size:14px;color:#888;margin-bottom:40px}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:32px;width:100%;max-width:680px}
.result-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:36px}
.result-item{text-align:center}
.result-label{font-size:11px;letter-spacing:1px;color:#666;text-transform:uppercase;margin-bottom:6px}
.result-val{font-size:26px;font-weight:700}
.result-val.red{color:#E62B1E}
.result-val.gray{color:#aaa}
.ctrl{display:flex;align-items:center;gap:14px;margin-bottom:22px}
.ctrl-label{font-size:12px;color:#888;min-width:80px}
.ctrl input[type=range]{flex:1;accent-color:#E62B1E;height:4px;cursor:pointer}
.ctrl-val{font-size:13px;font-weight:500;min-width:64px;text-align:right}
.bars{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-yr{font-size:10px;color:#555;min-width:28px;text-align:right}
.bar-track{flex:1;height:14px;background:#222;border-radius:3px;overflow:hidden;position:relative}
.bar-principal{height:100%;background:#444;border-radius:3px;position:absolute;left:0;top:0;transition:width .4s}
.bar-interest{height:100%;background:#E62B1E;border-radius:0 3px 3px 0;position:absolute;top:0;transition:width .4s, left .4s}
.bar-done .bar-principal{background:#1D5F45}
.bar-done .bar-interest{background:#1D9E75}
.bar-amt{font-size:10px;color:#555;min-width:44px;text-align:right}
.milestone{padding:10px 16px;border-radius:6px;margin-bottom:24px;font-size:13px;line-height:1.7;border-left:3px solid #E62B1E;background:rgba(230,43,30,0.08)}
.milestone.good{border-color:#1D9E75;background:rgba(29,158,117,0.08)}
.milestone.warn{border-color:#BA7517;background:rgba(186,117,23,0.08);color:#EF9F27}
.legend{display:flex;gap:20px;margin-top:12px;justify-content:center}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;color:#666}
.leg-dot{width:10px;height:10px;border-radius:2px}
.footer{margin-top:20px;font-size:11px;color:#444;text-align:center;max-width:680px}
</style>
</head>
<body>
<div class="ted-tag">Claude × 互動工具</div>
<h1>財富自由計算器</h1>
<p class="sub">拉動滑桿，即時看到你的財富自由時間表</p>

<div class="card">
  <div class="result-row">
    <div class="result-item"><div class="result-label">達到目標需要</div><div class="result-val red" id="r-years">18 年</div><div style="font-size:12px;color:#555;margin-top:4px" id="r-year-note">預計 2043 年</div></div>
    <div class="result-item"><div class="result-label">你實際存的錢</div><div class="result-val gray" id="r-principal">324 萬</div></div>
    <div class="result-item"><div class="result-label">複利幫你賺的</div><div class="result-val red" id="r-interest">676 萬</div></div>
  </div>

  <div class="ctrl">
    <span class="ctrl-label">每月存款</span>
    <input type="range" min="5000" max="80000" value="15000" step="1000" id="s-monthly">
    <span class="ctrl-val" id="v-monthly">NT$15,000</span>
  </div>
  <div class="ctrl">
    <span class="ctrl-label">年化報酬率</span>
    <input type="range" min="1" max="15" value="5" step="0.5" id="s-rate">
    <span class="ctrl-val" id="v-rate">5.0%</span>
  </div>
  <div class="ctrl" style="margin-bottom:28px">
    <span class="ctrl-label">目標金額</span>
    <input type="range" min="500" max="5000" value="1000" step="100" id="s-target">
    <span class="ctrl-val" id="v-target">1,000 萬</span>
  </div>

  <div class="milestone" id="milestone">厲害！你只需要 18 年就能達標——每月存這麼多，複利效果非常顯著。</div>

  <div style="font-size:11px;color:#555;margin-bottom:8px;letter-spacing:1px">逐年資產成長</div>
  <div class="bars" id="bars"></div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#444"></div>本金</div>
    <div class="leg"><div class="leg-dot" style="background:#E62B1E"></div>利息</div>
    <div class="leg"><div class="leg-dot" style="background:#1D9E75"></div>已達目標</div>
  </div>
</div>

<div class="footer">這個工具由 Claude 在對話裡直接產出。你可以對 Claude 說「幫我加上通膨率和月支出設定」，它會做一個更完整的版本。</div>

<script>
const sM=document.getElementById('s-monthly');
const sR=document.getElementById('s-rate');
const sT=document.getElementById('s-target');

function calc(){
  const monthly=Number(sM.value);
  const rate=Number(sR.value)/100/12;
  const target=Number(sT.value)*10000;
  document.getElementById('v-monthly').textContent='NT$'+monthly.toLocaleString();
  document.getElementById('v-rate').textContent=Number(sR.value).toFixed(1)+'%';
  document.getElementById('v-target').textContent=Number(sT.value).toLocaleString()+' 萬';

  let total=0,months=0;
  const yearlyData=[];
  while(total<target&&months<600){
    total=total*(1+rate)+monthly;
    months++;
    if(months%12===0){
      const principal=Math.min(monthly*months,total);
      yearlyData.push({yr:months/12,total:Math.round(total),principal:Math.round(principal),done:total>=target});
    }
  }
  const yrs=months<600?Math.ceil(months/12):99;
  const actualPrincipal=Math.min(monthly*months,target);
  const interest=Math.max(0,target-actualPrincipal);

  document.getElementById('r-years').textContent=yrs<99?yrs+' 年':'50年以上';
  document.getElementById('r-year-note').textContent='預計 '+(2025+yrs)+' 年';
  document.getElementById('r-principal').textContent=Math.round(actualPrincipal/10000)+' 萬';
  document.getElementById('r-interest').textContent=Math.round(interest/10000)+' 萬';

  const ms=document.getElementById('milestone');
  if(yrs<=10){ms.className='milestone good';ms.textContent='厲害！你只需要 '+yrs+' 年就能達標——每月存這麼多，複利效果非常顯著。';}
  else if(yrs<=20){ms.className='milestone good';ms.textContent=yrs+' 年可以達標，很穩健的計畫。在這期間，利息幫你賺到的錢約是你存入本金的 '+Math.round(interest/actualPrincipal*100)+'%。';}
  else if(yrs<99){ms.className='milestone warn';ms.textContent=yrs+' 年達標。試試看提高每月存款或報酬率，看時間如何縮短。';}
  else{ms.className='milestone';ms.textContent='以目前的存款和報酬率，超過 50 年才能達標。試著增加每月存款或提高報酬率。';}

  const barsEl=document.getElementById('bars');
  const showYears=Math.min(yrs<99?yrs:50,30);
  let html='';
  for(let i=0;i<Math.min(showYears,yearlyData.length);i++){
    const d=yearlyData[i];
    const totalPct=Math.min(100,Math.round(d.total/target*100));
    const prinPct=Math.min(totalPct,Math.round(d.principal/target*100));
    const intPct=totalPct-prinPct;
    const cls=d.done?'bar-row bar-done':'bar-row';
    html+=`<div class="${cls}"><div class="bar-yr">${d.yr}年</div><div class="bar-track"><div class="bar-principal" style="width:${prinPct}%"></div><div class="bar-interest" style="width:${intPct}%;left:${prinPct}%"></div></div><div class="bar-amt">${Math.round(d.total/10000)}萬</div></div>`;
  }
  barsEl.innerHTML=html;
}

sM.oninput=calc;sR.oninput=calc;sT.oninput=calc;
calc();
</script>
</body>
</html>
